server:
  port: 8080

spring:
  application:
    name: asyncaiflow
  datasource:
    url: jdbc:mysql://localhost:3306/asyncaiflow?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s
  jackson:
    serialization:
      write-dates-as-timestamps: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

logging:
  level:
    com.asyncaiflow: INFO

asyncaiflow:
  queue:
    lock-ttl-seconds: 300
    heartbeat-ttl-seconds: 60